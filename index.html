<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Win Expectancy Analytics Terminal v5.4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --dark: #0f172a; --panel: #1e293b; --accent: #fbbf24;
            --blue: #3b82f6; --red: #ef4444; --gray: #94a3b8; --led: #fde047;
        }
        body { font-family: 'Pretendard', sans-serif; background: #0f172a; margin: 0; padding: 10px; color: #e2e8f0; }
        .container { max-width: 950px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: #1e293b; border-radius: 6px; margin-bottom: 8px; }
        .env-input { width: 45px; background: #0f172a; color: var(--accent); border: 1px solid #334155; border-radius: 4px; padding: 2px 5px; text-align: center; font-weight: bold; }
        .scoreboard { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 10px; }
        .sb-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .sb-table th { color: #475569; font-size: 0.7rem; padding-bottom: 4px; }
        .sb-team-name-input { background: transparent; border: none; color: #fff; font-size: 0.9rem; font-weight: bold; width: 100%; outline: none; border-bottom: 1px solid transparent; }
        .sb-team-name-input:focus { border-bottom: 1px solid var(--accent); }
        .inn-val { color: var(--led); text-align: center; font-size: 1.1rem; font-family: 'Courier New', monospace; font-weight: bold; }
        .sb-total { color: var(--accent); font-size: 1.5rem; font-weight: 900; border-left: 1px solid #334155; text-align: center; }
        .main-grid { display: grid; grid-template-columns: 320px 1fr; gap: 10px; align-items: start; }
        .card { background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; color: var(--gray); margin-bottom: 4px; font-weight: bold; }
        select, textarea { width: 100%; padding: 8px; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 4px; font-size: 0.95rem; outline: none; box-sizing: border-box; }
        .score-ctrl { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 6px; }
        .score-display { width: 100%; background: transparent; color: var(--accent); border: none; font-size: 1.8rem; font-weight: 900; text-align: center; outline: none; }
        .btn-step { width: 30px; height: 35px; background: #334155; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .live-stats { margin-top: 15px; padding-top: 15px; border-top: 1px solid #334155; }
        .stat-value { font-size: 2.2rem; font-weight: 900; line-height: 1.2; }
        .val-wp { color: var(--red); } 
        .chart-card { min-height: 380px; padding: 10px; position: relative; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-save { background: var(--blue); color: white; }
        .btn-undo { background: #334155; color: #94a3b8; }
        .btn-csv { background: #10b981; color: white; margin-top: 10px; }
        .btn-import { background: #6366f1; color: white; margin-top: 10px; }
        .log-section { margin-top: 10px; background: #1e293b; border-radius: 8px; overflow: hidden; border: 1px solid #334155; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .log-table th { background: #0f172a; color: var(--gray); padding: 12px; text-align: left; cursor: pointer; }
        .log-table td { padding: 10px 12px; border-bottom: 1px solid #334155; }
        .change-plus { color: #4ade80; font-weight: bold; } 
        .change-minus { color: #f87171; font-weight: bold; } 
        .memo-row td { background: rgba(15, 23, 42, 0.4); padding: 5px 12px 10px 40px; color: var(--gray); font-style: italic; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <span style="color: var(--accent); font-weight: 900; letter-spacing: 1px;">Win Expectancy Terminal v5.4</span>
        <div style="display: flex; gap: 10px; align-items: center;">
            <label style="font-size: 0.75rem;">ENV(RE):</label>
            <input type="number" id="runEnv" value="4.5" step="0.1" class="env-input" oninput="calculate()">
        </div>
    </div>

    <div class="scoreboard">
        <table class="sb-table">
            <thead>
                <tr><th style="width:90px; text-align:left;">TEAM</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th style="width:40px;">R</th></tr>
            </thead>
            <tbody>
                <tr id="sb-v-row">
                    <td><input type="text" id="vTeamName" value="VISITOR" class="sb-team-name-input"></td>
                    <td class="inn-val" data-inn="1">-</td><td class="inn-val" data-inn="2">-</td><td class="inn-val" data-inn="3">-</td>
                    <td class="inn-val" data-inn="4">-</td><td class="inn-val" data-inn="5">-</td><td class="inn-val" data-inn="6">-</td>
                    <td class="inn-val" data-inn="7">-</td><td class="inn-val" data-inn="8">-</td><td class="inn-val" data-inn="9">-</td>
                    <td class="inn-val" data-inn="10">-</td><td class="inn-val" data-inn="11">-</td><td class="sb-total" id="vTotal">0</td>
                </tr>
                <tr id="sb-h-row">
                    <td><input type="text" id="hTeamName" value="HOME" class="sb-team-name-input"></td>
                    <td class="inn-val" data-inn="1">-</td><td class="inn-val" data-inn="2">-</td><td class="inn-val" data-inn="3">-</td>
                    <td class="inn-val" data-inn="4">-</td><td class="inn-val" data-inn="5">-</td><td class="inn-val" data-inn="6">-</td>
                    <td class="inn-val" data-inn="7">-</td><td class="inn-val" data-inn="8">-</td><td class="inn-val" data-inn="9">-</td>
                    <td class="inn-val" data-inn="10">-</td><td class="inn-val" data-inn="11">-</td><td class="sb-total" id="hTotal">0</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="main-grid">
        <div class="card">
            <div class="field-row">
                <div><label style="color: var(--blue);">VISITOR SCORE (TOTAL)</label><div class="score-ctrl"><button class="btn-step" onclick="changeScore('curVScore', -1)">-</button><input type="number" id="curVScore" value="0" class="score-display" readonly><button class="btn-step" onclick="changeScore('curVScore', 1)">+</button></div></div>
                <div><label style="color: var(--red);">HOME SCORE (TOTAL)</label><div class="score-ctrl"><button class="btn-step" onclick="changeScore('curHScore', -1)">-</button><input type="number" id="curHScore" value="0" class="score-display" readonly><button class="btn-step" onclick="changeScore('curHScore', 1)">+</button></div></div>
            </div>
            <div class="field-row">
                <div><label>INNING</label><select id="inning" onchange="calculate()"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option></select></div>
                <div><label>HALF</label><select id="half" onchange="calculate()"><option value="top">TOP</option><option value="bottom">BOT</option></select></div>
            </div>
            <div class="field-row">
                <div><label>OUTS</label><select id="outs" onchange="calculate()"><option value="0">0 Out</option><option value="1">1 Out</option><option value="2">2 Out</option><option value="3">3 Out</option></select></div>
                <div><label>RUNNERS</label><select id="bases" onchange="calculate()"><option value="0">None</option><option value="1">1st</option><option value="2">2nd</option><option value="3">3rd</option><option value="12">1st, 2nd</option><option value="13">1st, 3rd</option><option value="23">2nd, 3rd</option><option value="123">Loaded</option></select></div>
            </div>
            <textarea id="memo" rows="2" placeholder="MEMO..."></textarea>
            <div class="btn-group"><button class="btn-save" onclick="addLog()">LOG EVENT</button><button class="btn-undo" onclick="undo()">UNDO</button></div>
            <div class="live-stats">
                <div class="stat-item"><div class="stat-label">HOME WIN PROB</div><div class="stat-value val-wp" id="probDisplay">50.0%</div></div>
                <div class="stat-item"><div class="stat-label">LEVERAGE INDEX</div><div class="stat-value val-li" id="liDisplay">0.81</div></div>
            </div>
        </div>
        <div class="card chart-card"><canvas id="wpChart"></canvas></div>
    </div>

    <div class="log-section">
                <div style="display: flex; gap: 5px; padding: 10px;">
            <button class="btn-import" onclick="document.getElementById('csvInput').click()">IMPORT CSV</button>
            <input type="file" id="csvInput" style="display:none" accept=".csv" onchange="importCSV(event)">
            <button class="btn-csv" onclick="exportCSV()">EXPORT CSV</button>
        </div>

        <table class="log-table" id="logTable">
            <thead>
                <tr><th onclick="sortLogs('id')"># ↕</th><th onclick="sortLogs('sit')">SITUATION ↕</th><th onclick="sortLogs('sc')">SCORE ↕</th><th onclick="sortLogs('wp')">HOME WP ↕</th><th onclick="sortLogs('chg')">ΔOFFENSE ↕</th><th onclick="sortLogs('li')">LI ↕</th></tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>
</div>

<script src="data.js"></script>
<script>
    let wpChart;
    let logsData = [];
    const historyStack = [];
    let currentSort = { key: 'id', dir: -1 };

    function initChart() {
        const ctx = document.getElementById('wpChart').getContext('2d');
        wpChart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['0'], datasets: [{ label: 'HOME WP (%)', data: [50], borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', tension: 0.1, fill: true, pointRadius: 3 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100, grid: { color: '#334155' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
        });
    }

    function changeScore(targetId, delta) {
        const el = document.getElementById(targetId);
        let newVal = Number(el.value) + delta;
        if (newVal < 0) newVal = 0;
        el.value = newVal;
        calculate();
    }

    function refreshScoreboard() {
        const curVTotal = Number(document.getElementById('curVScore').value);
        const curHTotal = Number(document.getElementById('curHScore').value);
        const curI = Number(document.getElementById('inning').value);
        const half = document.getElementById('half').value;

        let prevVSum = 0, prevHSum = 0;
        for(let i=1; i<curI; i++) {
            const vVal = document.querySelector(`#sb-v-row [data-inn="${i}"]`).innerText;
            const hVal = document.querySelector(`#sb-h-row [data-inn="${i}"]`).innerText;
            if(vVal !== '-' && vVal !== '·') prevVSum += Number(vVal);
            if(hVal !== '-' && hVal !== '·') prevHSum += Number(hVal);
        }

        for(let i=1; i<=11; i++) {
            const vCell = document.querySelector(`#sb-v-row [data-inn="${i}"]`);
            const hCell = document.querySelector(`#sb-h-row [data-inn="${i}"]`);
            if (i === curI) {
                vCell.innerText = curVTotal - prevVSum;
                hCell.innerText = (half === 'bottom') ? (curHTotal - prevHSum) : (hCell.innerText === '-' || hCell.innerText === '·' ? '·' : hCell.innerText);
            } else if (i > curI) {
                vCell.innerText = "-";
                hCell.innerText = "-";
            }
        }
        document.getElementById('vTotal').innerText = curVTotal;
        document.getElementById('hTotal').innerText = curHTotal;
    }

    function getHomeWP(i, h, o, b, vs, hs, env) {
        let lookI = i, lookH = h, lookO = o, lookB = b;
        if(lookO === 3) { lookO = 0; lookB = "0"; if(lookH === 'top') lookH = 'bottom'; else { lookI = lookI + 1; lookH = 'top'; } }
        const envF = 4.5 / env;
        let diff = Math.round((hs - vs) * envF);
        diff = Math.max(-15, Math.min(15, diff));
        const sit = bigTable[`${lookI > 9 ? 9 : lookI}_${lookH}_${lookO}_${lookB}`];
        return sit ? sit.probs[diff.toString()] : (hs >= vs ? 1.0 : 0.0);
    }

    function calculate() {
        if(typeof bigTable === 'undefined') return;
        refreshScoreboard();
        const vS = Number(document.getElementById('curVScore').value);
        const hS = Number(document.getElementById('curHScore').value);
        const i = Number(document.getElementById('inning').value), h = document.getElementById('half').value;
        const o = Number(document.getElementById('outs').value), b = document.getElementById('bases').value, env = Number(document.getElementById('runEnv').value);
        let homeWP = getHomeWP(i, h, o, b, vS, hS, env);
        if (o === 3) {
            let nI = i, nH = h; if(h === 'top') nH = 'bottom'; else nI++;
            homeWP = getHomeWP(nI, nH, 0, "0", vS, hS, env);
        }
        let li = 0;
        if (o < 3) {
            const nO_WP = getHomeWP(i, h, o + 1, b, vS, hS, env);
            li = Math.abs(homeWP - nO_WP) / 0.027;
            document.getElementById('liDisplay').innerText = li.toFixed(2);
        } else { document.getElementById('liDisplay').innerText = "---"; }
        document.getElementById('probDisplay').innerText = (homeWP * 100).toFixed(1) + '%';
    }

    function addLog() {
        const i = document.getElementById('inning').value, h = document.getElementById('half').value;
        const o = document.getElementById('outs').value, b = document.getElementById('bases').value;
        const vT = Number(document.getElementById('curVScore').value);
        const hT = Number(document.getElementById('curHScore').value);
        const cWP = parseFloat(document.getElementById('probDisplay').innerText);
        const li = document.getElementById('liDisplay').innerText;
        const m = document.getElementById('memo').value.trim();
        const sitStr = `${i}_${h==='top'?'T':'B'}_${o}_${b}`;
        let dOff = logsData.length > 0 ? (h === 'top' ? -(cWP - logsData[logsData.length-1].homeWP) : (cWP - logsData[logsData.length-1].homeWP)) : 0;
        logsData.push({ id: logsData.length + 1, sit: sitStr, sc: `${vT}:${hT}`, homeWP: cWP, chg: dOff, li, memo: m });
        updateChart();
        if(Number(o) === 3) {
            if(h === 'top') document.getElementById('half').value = 'bottom';
            else { document.getElementById('inning').value = Math.min(11, Number(i) + 1); document.getElementById('half').value = 'top'; }
            document.getElementById('outs').value = "0"; document.getElementById('bases').value = "0";
        }
        saveState(true); renderLogs(); calculate(); document.getElementById('memo').value = '';
    }

    function updateChart() {
        wpChart.data.labels = ['0', ...logsData.map(l => l.id.toString())];
        wpChart.data.datasets[0].data = [50, ...logsData.map(l => l.homeWP)];
        wpChart.update();
    }

    function renderLogs() {
        const b = document.getElementById('logBody'); b.innerHTML = '';
        const sorted = [...logsData].sort((a, b) => {
            let vA = a[currentSort.key], vB = b[currentSort.key];
            if (['homeWP', 'chg', 'li'].includes(currentSort.key)) { vA = parseFloat(vA) || 0; vB = parseFloat(vB) || 0; }
            return vA > vB ? currentSort.dir : -currentSort.dir;
        });
        sorted.forEach(l => {
            const r1 = b.insertRow();
            const cCl = l.chg > 0 ? 'change-plus' : (l.chg < 0 ? 'change-minus' : '');
            r1.innerHTML = `<td>${l.id}</td><td>${l.sit}</td><td>${l.sc}</td><td>${l.homeWP.toFixed(1)}%</td><td class="${cCl}">${(l.id===1?'-':(l.chg>0?'+':'')+l.chg.toFixed(1)+'%')}</td><td>${l.li}</td>`;
            if(l.memo) { const r2 = b.insertRow(); r2.className = 'memo-row'; r2.innerHTML = `<td colspan="6">↳ ${l.memo}</td>`; }
        });
    }

    function exportCSV() {
        let csv = "No,Situation,Score,Home_WP,Delta_Offense,LI,Note\n";
        logsData.forEach(l => csv += `${l.id},${l.sit},${l.sc},${l.homeWP.toFixed(2)},${l.chg.toFixed(2)},${l.li},"${l.memo.replace(/"/g, '""')}"\n`);
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
        link.download = `WinExp_Log_${new Date().toISOString().slice(0,10)}.csv`; link.click();
    }

    // [로직 대폭 개선] 하프 이닝별 최종 로그만 추출하여 전광판 복원
    function importCSV(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const lines = text.split('\n').filter(l => l.trim() !== "");
            const newLogs = [];
            
            // 전광판 초기화
            document.querySelectorAll('.inn-val').forEach(el => el.innerText = "-");

            // 1. 하프 이닝별 마지막 총점을 저장할 객체
            const halfInningScores = {}; 

            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 7) continue;
                const log = { id: parseInt(cols[0]), sit: cols[1], sc: cols[2], homeWP: parseFloat(cols[3]), chg: parseFloat(cols[4]), li: cols[5], memo: cols[6].replace(/^"|"$/g, '').replace(/""/g, '"') };
                newLogs.push(log);

                const [inn, half] = log.sit.split('_');
                const key = `${inn}_${half}`;
                // 로그를 순서대로 읽으므로, 같은 하프이닝이면 덮어씌워져 결국 '마지막 총점'이 남음
                halfInningScores[key] = log.sc.split(':').map(Number);
            }

            // 2. 하프 이닝별 최종 데이터를 기반으로 전광판 칸 채우기
            let lastV = 0, lastH = 0;
            for(let inn=1; inn<=11; inn++) {
                const topKey = `${inn}_T`, botKey = `${inn}_B`;
                
                if (halfInningScores[topKey]) {
                    const [vT, hT] = halfInningScores[topKey];
                    document.querySelector(`#sb-v-row [data-inn="${inn}"]`).innerText = vT - lastV;
                    lastV = vT;
                }
                if (halfInningScores[botKey]) {
                    const [vB, hB] = halfInningScores[botKey];
                    document.querySelector(`#sb-h-row [data-inn="${inn}"]`).innerText = hB - lastH;
                    lastH = hB;
                }
            }

            if (newLogs.length > 0) {
                logsData = newLogs;
                const last = logsData[logsData.length - 1];
                const [vT, hT] = last.sc.split(':').map(Number);
                const [inn, half, out, base] = last.sit.split('_');
                
                // 입력창을 파일의 최종 누적 총점으로 동기화
                document.getElementById('curVScore').value = vT;
                document.getElementById('curHScore').value = hT;
                document.getElementById('inning').value = inn;
                document.getElementById('half').value = (half === 'T' ? 'top' : 'bottom');
                document.getElementById('outs').value = out;
                document.getElementById('bases').value = base;
                
                renderLogs(); updateChart(); calculate(); 
            }
        };
        reader.readAsText(file);
    }

    function sortLogs(key) { if (currentSort.key === key) currentSort.dir *= -1; else { currentSort.key = key; currentSort.dir = 1; } renderLogs(); }
    function saveState(isLog = false) { historyStack.push(JSON.stringify({ vS: document.getElementById('curVScore').value, hS: document.getElementById('curHScore').value, inn: document.getElementById('inning').value, half: document.getElementById('half').value, outs: document.getElementById('outs').value, bases: document.getElementById('bases').value, env: document.getElementById('runEnv').value, isLog })); }
    function undo() { if(logsData.length <= 1 && historyStack.length <= 2) return; const last = JSON.parse(historyStack.pop()); if(last.isLog) { logsData.pop(); renderLogs(); updateChart(); } const prev = JSON.parse(historyStack[historyStack.length - 1]); document.getElementById('curVScore').value = prev.vS; document.getElementById('curHScore').value = prev.hS; document.getElementById('inning').value = prev.inn; document.getElementById('half').value = prev.half; document.getElementById('outs').value = prev.outs; document.getElementById('bases').value = prev.bases; document.getElementById('runEnv').value = prev.env; calculate(); }

    document.querySelectorAll('select').forEach(el => el.addEventListener('change', calculate));
    window.onload = () => { 
        initChart(); 
        logsData = [{ id: 1, sit: "1_T_0_0", sc: "0:0", homeWP: 50.0, chg: 0, li: "0.81", memo: "Play Ball!" }];
        renderLogs(); updateChart(); calculate(); saveState(true);
    };
</script>
</body>
</html>
